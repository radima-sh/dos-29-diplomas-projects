name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: cr.yandex/crp5d38eikvdl1p4haav/sitechecker-registry
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with: { go-version: '1.21', cache: true }
      - name: Dependencies
        run: go mod download
        working-directory: sitechecker
      - name: Lint
        uses: golangci/golangci-lint-action@v3
        with: { version: latest, working-directory: sitechecker }
      - name: Test
        run: go test -v ./...
        working-directory: sitechecker

  - name: Build & Push
  uses: docker/build-push-action@v5
  with:
    context: .
    file: Dockerfile
    push: true
    tags: ${{ env.REGISTRY }}:${{ env.IMAGE_TAG }}, ${{ env.REGISTRY }}:latest
    # Кеш временно отключён для стабильности
    # cache-from: type=gha
    # cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/sitechecker
            echo "${{ secrets.YC_SA_KEY }}" | docker login -u json_key --password-stdin cr.yandex
            docker compose pull
            docker compose up -d
            docker system prune -af --volumes
