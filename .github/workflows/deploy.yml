name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: cr.yandex/crp5d38eikvdl1p4haav/sitechecker-registry

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: sitechecker/go.sum
      - run: go mod download
        working-directory: sitechecker
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: sitechecker
      - name: Test
        run: go test -v ./...
        working-directory: sitechecker

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to YC Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_KEY }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/sitechecker
            
            # Декодируем base64-ключ и авторизуемся
            echo "${{ secrets.YC_SA_KEY }}" | base64 -d | docker login -u json_key --password-stdin cr.yandex
            
            # Удаляем старый образ
            docker compose down app 2>/dev/null || true
            docker images | grep sitechecker-registry | awk '{print $3}' | xargs -r docker rmi -f 2>/dev/null || true
            
            # Скачиваем свежий образ
            docker compose pull app
            
            # Запускаем с новым образом
            docker compose up -d --force-recreate --no-deps app
            
            # Чистим старые образы
            docker image prune -f
