name: CI/CD Pipeline

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

env:
  REGISTRY: cr.yandex/crp5d38eikvdl1p4haav/sitechecker-registry

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: sitechecker/go.sum
      - run: go mod download
        working-directory: sitechecker
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: sitechecker
      - name: Test
        run: go test -v ./...
        working-directory: sitechecker

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Decode YC Key to Env Var
        id: decode-key
        run: |
          DECODED_KEY=$(echo "${{ secrets.YC_SA_KEY }}" | base64 -d)
          echo "key<<EOF" >> $GITHUB_OUTPUT
          echo "$DECODED_KEY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Login to YC Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ steps.decode-key.outputs.key }}
      
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}:latest
          no-cache: true
          build-args: |
            REBUILD_TS=${{ github.run_id }}-${{ github.run_attempt }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Копируем docker-compose.yml на сервер
      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/sitechecker"
          strip_components: 0
          overwrite: true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/sitechecker
            
            echo "Starting deployment"
            echo "Time: $(date)"
            
            # Создаём .env из GitHub Secret
            cat > .env << 'EOF'
            ${{ secrets.ENV_FILE }}
            EOF
            chmod 600 .env
            
            # Авторизуемся в Yandex Container Registry
            echo "${{ secrets.YC_SA_KEY }}" | base64 -d | docker login -u json_key --password-stdin cr.yandex
            
            # Скачиваем свежий образ
            docker compose pull app
            
            # Пересоздаём контейнер приложения (БД не трогаем)
            docker compose up -d --force-recreate --no-deps app
            
            # Ждём запуска
            sleep 5
            
            # Проверяем статус
            echo "Container status"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            
            # Чистим старые образы
            docker image prune -f
            
            echo "Deployment complete"

      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Site Checker CI/CD - ${{ job.status }}"
          body: "Job completed on branch ${{ github.ref_name }}\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}"
          to: radima.m@list.ru
          from: GitHub Actions CI/CD
